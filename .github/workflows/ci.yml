name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installation des dépendances
        run: npm install
        working-directory: backend

      - name: Lancement des tests unitaires
        run: npm test
        working-directory: backend

  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Créer le fichier .env
        run: |
          cat > .env << 'EOF'
          POSTGRES_DB=todo_db
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=changeme
          DB_HOST=db
          DB_PORT=5432
          DB_NAME=todo_db
          DB_USER=postgres
          DB_PASSWORD=changeme
          PORT=3000
          API_URL=http://localhost:3000
          EOF

      - name: Démarrer les conteneurs
        run: docker compose up -d --build

      - name: Attendre que le backend soit prêt
        run: |
          echo "Waiting for backend..."
          until curl -sf http://localhost:3000/api/tasks; do sleep 2; done
          echo "Backend ready"
        timeout-minutes: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Installation des dépendances E2E
        run: npm install
        working-directory: e2e

      - name: Installation de Chromium
        run: npx playwright install chromium --with-deps
        working-directory: e2e

      - name: Lancement des tests E2E
        run: npm test
        working-directory: e2e

      - name: Upload du rapport Playwright
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
