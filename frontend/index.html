<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Ma Todo List</h1>

    <form id="task-form">
      <input type="text" id="task-input" placeholder="Nouvelle tâche..." required>
      <select id="priority-select">
        <option value="high">Haute</option>
        <option value="medium" selected>Moyenne</option>
        <option value="low">Basse</option>
      </select>
      <input type="date" id="due-date-input">
      <button type="submit">Ajouter</button>
    </form>

    <input type="text" id="search-input" placeholder="Rechercher une tâche...">

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Toutes</button>
      <button class="filter-btn" data-filter="active">Actives</button>
      <button class="filter-btn" data-filter="completed">Complétées</button>
    </div>

    <ul id="task-list"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
